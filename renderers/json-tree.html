<!DOCTYPE html>
<html><head>
<style>
  body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
  .key { color: #e94560; } .string { color: #4ea8de; } .number { color: #a8e94e; }
  .null { color: #888; } .bool { color: #e9a84e; }
  pre { font-size: 14px; line-height: 1.5; }
</style>
</head><body>
<pre id="content"></pre>
<script>
  const data = window.__ELASTIK_DATA__ || '{}';
  function highlight(obj, indent) {
    indent = indent || 0;
    const pad = ' '.repeat(indent * 2);
    if (obj === null) return '<span class="null">null</span>';
    if (typeof obj === 'boolean') return '<span class="bool">' + obj + '</span>';
    if (typeof obj === 'number') return '<span class="number">' + obj + '</span>';
    if (typeof obj === 'string') return '<span class="string">"' + obj.replace(/</g,'&lt;') + '"</span>';
    if (Array.isArray(obj)) {
      if (!obj.length) return '[]';
      return '[\n' + obj.map(v => pad + '  ' + highlight(v, indent+1)).join(',\n') + '\n' + pad + ']';
    }
    const keys = Object.keys(obj);
    if (!keys.length) return '{}';
    return '{\n' + keys.map(k => pad + '  <span class="key">"' + k + '"</span>: ' + highlight(obj[k], indent+1)).join(',\n') + '\n' + pad + '}';
  }
  try {
    document.getElementById('content').innerHTML = highlight(JSON.parse(data));
  } catch(e) {
    document.getElementById('content').textContent = data;
  }
</script>
</body></html>
