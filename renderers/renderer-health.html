<!DOCTYPE html>
<html><head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font:14px/1.6 'SF Mono',Consolas,monospace;padding:24px}
h1{font-size:18px;color:#fff;margin-bottom:20px;font-weight:500}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.c{background:#161616;border:1px solid #2a2a2a;border-radius:8px;padding:16px}
.c h2{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:400}
.v{font-size:22px;color:#fff;font-weight:600}
.sm{font-size:12px;color:#666;margin-top:4px}
.tag{display:inline-block;background:#1a2a1a;color:#4a4;padding:2px 8px;border-radius:4px;font-size:12px;margin:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
td{padding:4px 8px;border-bottom:1px solid #222}
td:first-child{color:#aaa}
.bar{height:4px;background:#222;border-radius:2px;margin-top:6px}
.bar-fill{height:100%;background:#4a4;border-radius:2px;transition:width .3s}
.ts{text-align:right;color:#444;font-size:11px;margin-top:16px}
.dot-on{color:#4a4}.dot-off{color:#a44}
</style>
</head><body>
<h1>elastik task manager</h1>
<div class="g">
  <div class="c"><h2>ollama</h2><div id="ollama"></div></div>
  <div class="c"><h2>uptime</h2><div id="uptime"></div></div>
  <div class="c"><h2>worlds</h2><div id="worlds"></div></div>
  <div class="c"><h2>cache</h2><div id="cache"></div></div>
  <div class="c"><h2>plugins</h2><div id="plugins"></div></div>
  <div class="c"><h2>cron tasks</h2><div id="cron"></div></div>
</div>
<div class="ts" id="ts"></div>
<script>
function render(h) {
  if (!h || !h.ollama) return;
  const ol = h.ollama;
  const dot = ol.status === 'online' ? '<span class="dot-on">●</span>' : '<span class="dot-off">●</span>';
  const models = ol.models.map(m => m.split(':')[0]);
  const shown = models.slice(0,6).join(', ') + (models.length > 6 ? ` +${models.length-6}` : '');
  document.getElementById('ollama').innerHTML =
    `<div class="v">${dot} ${ol.status}</div><div class="sm">${ol.models.length} models: ${shown}</div>`;

  const s = h.uptime_seconds;
  const hh = Math.floor(s/3600), mm = Math.floor(s%3600/60);
  const up = hh ? `${hh}h ${mm}m` : `${mm}m`;
  document.getElementById('uptime').innerHTML =
    `<div class="v">${up}</div><div class="sm">memory ${h.memory_mb} MB · disk ${h.disk_free_gb} GB free</div>`;

  document.getElementById('worlds').innerHTML =
    `<div class="v">${h.worlds.count}</div><div class="sm">${h.worlds.total_size_kb} KB total</div>`;

  const c = h.cache, total = c.hits + c.misses;
  const rate = total ? Math.round(c.hits/total*100) + '%' : '—';
  document.getElementById('cache').innerHTML =
    `<div class="v">${c.entries} entries</div>` +
    `<div class="sm">hits ${c.hits} / misses ${c.misses} · rate ${rate}</div>` +
    `<div class="bar"><div class="bar-fill" style="width:${total ? rate : '0%'}"></div></div>`;

  document.getElementById('plugins').innerHTML =
    h.plugins.loaded.map(p => `<span class="tag">${p}</span>`).join('');

  const rows = Object.entries(h.cron_tasks || {}).map(([n,t]) =>
    `<tr><td>${n}</td><td>${t.interval}s</td><td>${t.last_run.slice(11,19)}</td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:#666">none</td></tr>';
  document.getElementById('cron').innerHTML = `<table>${rows}</table>`;

  document.getElementById('ts').textContent = h.timestamp.slice(0,19) + 'Z · auto-refresh 60s';
}

const data = window.__ELASTIK_DATA__ || '{}';
try { render(JSON.parse(data)); } catch(e) {}
</script>
</body></html>
