name: Release

# Triggered by pushing a tag like v2.0.0 or v2.1.0-rc1.
# Builds elastik-go for 5 OS/arch combos and attaches them to a
# GitHub Release. Binaries are never committed to the repo.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create/upload releases

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: go/go.sum

      - name: build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p ../dist
          OUT="../dist/elastik-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath -ldflags="-s -w" -o "$OUT" ./native
          ls -lh "$OUT"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elastik-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/elastik-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -lh dist/

      - name: compute checksums
        working-directory: dist
        run: sha256sum elastik-go-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/elastik-go-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
